# AISE 4030 Assignment 2 — Policy Gradient configuration
# Agent selection: "reinforce" or "ppo"

agent_type: "reinforce"

environment:
  name: "BipedalWalker-v3"
  seed: 42

shared:
  gamma: 0.99
  hidden_sizes: [64, 64]
  activation: "tanh"
  max_grad_norm: 0.5
  device: "auto"

reinforce:
  policy_lr: 3.0e-4
  value_lr: 1.0e-3
  max_episodes: 3000
  moving_average_window: 100
  checkpoint_interval: 100
  eval_episodes: 5
  normalize_returns: true
  return_norm_epsilon: 1.0e-8

ppo:
  lr: 3.0e-4
  rollout_length: 2048
  mini_batch_size: 64
  epochs: 10
  clip_epsilon: 0.2
  gae_lambda: 0.95
  value_loss_coef: 0.5
  entropy_coef: 0.01
  max_episodes: 2000
  moving_average_window: 100
  checkpoint_interval: 100
  eval_episodes: 5

paths:
  reinforce_results: "reinforce_results"
  ppo_results: "ppo_results"

run:
  checkpoint: null
  render: false
