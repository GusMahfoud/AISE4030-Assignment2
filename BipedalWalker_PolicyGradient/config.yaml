# AISE 4030 Assignment 2 — Policy Gradient configuration
# Agent selection: "reinforce" or "ppo" (PPO not implemented in this scaffold)

agent_type: "reinforce"

environment:
  name: "BipedalWalker-v3"
  seed: 42

shared:
  gamma: 0.99
  hidden_sizes: [64, 64]
  activation: "tanh"
  max_grad_norm: 0.5
  device: "auto"

reinforce:
  policy_lr: 0.0003
  value_lr: 0.001
  max_episodes: 3000
  moving_average_window: 100
  checkpoint_interval: 100
  eval_episodes: 5
  # When true: standardize (G_t - V(s_t)) per episode for the policy loss; critic still fits raw G_t (PDF 4.2.4).
  normalize_returns: true
  return_norm_epsilon: 1.0e-8

ppo:
  lr: 0.0003
  rollout_length: 2048
  mini_batch_size: 64
  epochs: 10
  clip_epsilon: 0.2
  gae_lambda: 0.95
  value_loss_coef: 0.5
  entropy_coef: 0.01
  max_episodes: 2000

paths:
  reinforce_results: "reinforce_results"
  ppo_results: "ppo_results"

run:
  # Default paths; can be overridden via CLI for eval
  checkpoint: null
  render: false
